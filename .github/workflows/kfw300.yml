name: kfw300 daily update (KfW backup)
# Hinweis: Das Interhyp-Scraping läuft primär als IONOS-Cronjob (api/cron-zinsen.php).
# Dieser Workflow aktualisiert die KfW-Konditionen auf GitHub als Hauptquelle.
# Die Website lädt zuerst die GitHub-Datei (raw.githubusercontent.com) und fällt
# erst bei Fehler auf die IONOS-Datei (data/kfw/300.json) zurück.

on:
  schedule:
    # Off-peak Minute, damit GitHub den Lauf nicht unter Last verwirft.
    # 06:23 UTC = 08:23 Berlin (Sommer) / 07:23 Berlin (Winter) — einmal täglich.
    - cron: '23 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-kfw300:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch KfW 300 rates
        run: npm run kfw:300

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/kfw/300.json; then
            echo "No changes in data/kfw/300.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kfw/300.json
          git commit -m "chore: update KfW 300 rates"
          git push
